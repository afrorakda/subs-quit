<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUBS QUIT</title>
    
    <link rel="icon" href="image_113.png">
    <link rel="apple-touch-icon" href="image_113.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --text-gray: #666;
            --warn: #e74c3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        header { margin-bottom: 20px; }
        h1 { font-size: 1.8rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: var(--text-gray); font-weight: 600; margin-top: 4px; }

        .input-card {
            background: var(--input-bg);
            padding: 20px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            margin-bottom: 20px;
            text-align: left;
        }

        .label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-gray);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; margin-bottom: 10px; }
        
        input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            background: #fff;
            font-size: 1rem;
            font-weight: 700;
            color: var(--main) !important;
            box-sizing: border-box;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
            user-select: text;
        }
        input::placeholder { color: #bbb; -webkit-text-fill-color: #bbb; }

        .clr-btn {
            position: absolute;
            right: 8px;
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.05);
            border: none;
            border-radius: 50%;
            color: #888;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .clr-btn.active { display: flex; }

        .add-btn {
            width: 100%;
            background: var(--main);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 5px;
            transition: opacity 0.2s;
        }
        .add-btn:active { transform: scale(0.98); opacity: 0.9; }

        .list-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .subs-item {
            background: #fff;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: left;
            transition: border-color 0.3s;
        }

        .subs-info { flex-grow: 1; min-width: 0; }
        .subs-name { font-weight: 800; font-size: 1rem; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .subs-date { font-size: 0.7rem; color: var(--text-gray); font-weight: 700; text-transform: uppercase; }

        .subs-countdown {
            text-align: right;
            margin: 0 15px;
            min-width: 50px;
        }
        .days-num { font-size: 1.8rem; font-weight: 900; line-height: 1; display: block; }
        .days-unit { font-size: 0.6rem; font-weight: 800; color: var(--text-gray); text-transform: uppercase; }

        .del-btn {
            background: var(--accent);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: var(--text-gray);
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 警告・当日カラー */
        .urgent { border-color: var(--warn) !important; border-style: solid; }
        .urgent .days-num { color: var(--warn); }
        .urgent .subs-date { color: var(--warn); }

        .footer-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .kofi-btn {
            flex: 6; background: var(--main); color: #fff;
            padding: 12px; border-radius: var(--radius);
            text-decoration: none; font-weight: bold; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
        }
        .home-btn {
            flex: 4; background: var(--accent); color: var(--main);
            border: none; padding: 12px;
            border-radius: var(--radius); font-weight: 800; font-size: 12px; 
            cursor: pointer;
        }

        footer { font-size: 10px; color: #aaa; line-height: 1.6; font-weight: 500; padding-bottom: 10px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 340px; padding: 30px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SUBS QUIT</h1>
        <p class="subtitle">Personal billing exit list.</p>
    </header>

    <div class="input-card">
        <label class="label">Service Name</label>
        <div class="input-wrapper">
            <input type="text" id="nameInput" placeholder="e.g. Netflix" oninput="toggleClr('nameInput', 'clrName')">
            <button class="clr-btn" id="clrName" onclick="clearInp('nameInput', 'clrName')">×</button>
        </div>
        
        <label class="label">Next Billing Date</label>
        <div class="input-wrapper">
            <input type="date" id="dateInput">
        </div>
        
        <button class="add-btn" onclick="addItem()">ADD TO LIST</button>
    </div>

    <div id="subsList" class="list-container"></div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add Home</button>
    </div>

    <footer>
        <div>No login / No tracking / No ads / Browser only</div>
        <div><a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026</div>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3>📱 Install</h3>
        <p>Add to your home screen.</p>
        <p>🍏 <strong>iPhone (Safari):</strong><br>Tap Share, then Add to Home Screen.</p>
        <p>🤖 <strong>Android (Chrome):</strong><br>Tap Menu (⋮), then Add to Home Screen.</p>
    </div>
</div>

<script>
    let subs = JSON.parse(localStorage.getItem('fc_subs_quit') || '[]');

    function toggleClr(inputId, btnId) {
        const val = document.getElementById(inputId).value;
        document.getElementById(btnId).classList.toggle('active', val !== '');
    }

    function clearInp(inputId, btnId) {
        document.getElementById(inputId).value = '';
        toggleClr(inputId, btnId);
        document.getElementById(inputId).focus();
    }

    function addItem() {
        const name = document.getElementById('nameInput').value.trim();
        const date = document.getElementById('dateInput').value;
        if (!name || !date) return;

        subs.push({ id: Date.now(), name, date });
        saveAndRender();

        document.getElementById('nameInput').value = '';
        document.getElementById('dateInput').value = '';
        toggleClr('nameInput', 'clrName');
    }

    function deleteItem(id) {
        subs = subs.filter(item => item.id !== id);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('fc_subs_quit', JSON.stringify(subs));
        renderList();
    }

    function renderList() {
        const list = document.getElementById('subsList');
        list.innerHTML = '';
        const now = new Date();
        now.setHours(0,0,0,0);

        const sorted = [...subs].sort((a, b) => new Date(a.date) - new Date(b.date));

        sorted.forEach(item => {
            const target = new Date(item.date);
            target.setHours(0,0,0,0);
            const diffDays = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            
            // Format date for display (e.g., Apr 30, 2026)
            const dStr = target.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const isZero = diffDays === 0;
            const displayNum = diffDays < 0 ? "!" : diffDays;

            const div = document.createElement('div');
            div.className = `subs-item ${isZero ? 'urgent' : ''}`;
            div.innerHTML = `
                <div class="subs-info">
                    <div class="subs-name">${item.name}</div>
                    <div class="subs-date">Next Bill: ${dStr}</div>
                </div>
                <div class="subs-countdown">
                    <span class="days-num">${displayNum}</span>
                    <span class="days-unit">${diffDays < 0 ? 'PAST' : 'DAYS'}</span>
                </div>
                <button class="del-btn" onclick="deleteItem(${item.id})">×</button>
            `;
            list.appendChild(div);
        });
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }
    
    renderList();
</script>

</body>
</html>
