<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUBS QUIT</title>
    
    <link rel="icon" href="image_113.png">
    <link rel="apple-touch-icon" href="image_113.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --warn: #e74c3c;
            --past: #f39c12;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -1.5px; }
        
        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 14px;
            border-radius: 12px;
        }

        .subtitle { font-size: 0.9rem; color: #666; font-weight: 800; margin-bottom: 20px; text-align: left; }

        /* Input Section */
        .input-card {
            background: var(--input-bg);
            padding: 20px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            margin-bottom: 20px;
            text-align: left;
        }

        .label {
            font-size: 0.8rem;
            font-weight: 900;
            color: #555;
            margin-bottom: 6px;
            margin-left: 5px;
            text-transform: uppercase;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; margin-bottom: 12px; }
        
        input {
            width: 100%;
            padding: 14px;
            padding-right: 45px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            background: #fff;
            font-size: 1rem;
            font-weight: 800;
            color: var(--main) !important;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        input::placeholder { color: #ccc !important; -webkit-text-fill-color: #ccc !important; }
        input:focus { border-color: var(--main); }

        .clr-btn {
            position: absolute;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #ccc;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .clr-btn.active { display: flex; }

        .add-btn {
            width: 100%;
            background: var(--main);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            -webkit-text-fill-color: #fff;
        }
        .add-btn:active { transform: scale(0.98); }

        /* List Area */
        .list-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .subs-item {
            background: #fff;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-align: left;
        }

        .subs-info { flex: 1; min-width: 0; }
        .subs-name { font-weight: 900; font-size: 1.1rem; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .subs-date { font-size: 0.75rem; color: #888; font-weight: 800; text-transform: uppercase; }

        .subs-countdown {
            text-align: center;
            margin: 0 15px;
            min-width: 60px;
        }
        .days-num { font-size: 2rem; font-weight: 900; line-height: 1; display: block; }
        .days-unit { font-size: 0.65rem; font-weight: 900; color: #999; text-transform: uppercase; }

        .del-btn {
            background: var(--accent);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: #777;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Status Colors */
        .urgent { border-color: var(--warn) !important; border-width: 3px; }
        .urgent .days-num, .urgent .subs-name { color: var(--warn); }
        .urgent .days-unit { color: var(--warn); opacity: 0.8; }

        .past-due { border-color: var(--past) !important; opacity: 0.8; }
        .past-due .days-num, .past-due .subs-name { color: var(--past); }

        /* Footer & Buttons */
        .footer-btns { margin-top: auto; padding: 20px 0; text-align: center; }
        .kofi-btn {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--main); color: #fff; width: 100%; max-width: 340px;
            padding: 18px; border-radius: var(--radius);
            text-decoration: none; font-weight: 900; font-size: 1rem; margin-bottom: 12px;
            -webkit-text-fill-color: #fff;
        }
        .home-btn {
            display: block; width: 100%; max-width: 340px; margin: 0 auto; 
            background: var(--accent); color: var(--main); border: none; 
            padding: 14px; border-radius: var(--radius); font-weight: 800; font-size: 0.9rem; cursor: pointer;
        }

        footer { padding: 15px 0; text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; }
        footer a { color: inherit; text-decoration: underline; }

        /* Modal */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 320px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SUBS QUIT</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Personal billing exit list.</p>

    <div class="input-card">
        <div class="label">Service Name</div>
        <div class="input-wrapper">
            <input type="text" id="nameInput" placeholder="e.g. Netflix" oninput="toggleClr('nameInput', 'clrName')">
            <button class="clr-btn" id="clrName" onclick="clearInp('nameInput', 'clrName')">×</button>
        </div>
        
        <div class="label">Next Billing Date</div>
        <div class="input-wrapper">
            <input type="date" id="dateInput">
        </div>
        
        <button class="add-btn" onclick="addItem()">ADD TO LIST</button>
    </div>

    <div id="subsList" class="list-container"></div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 style="margin-bottom: 10px; font-weight: 900;">📱 Install</h3>
        <div style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            <p>🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen</p>
            <p style="margin-top:10px;">🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen</p>
        </div>
    </div>
</div>

<script>
    let subs = JSON.parse(localStorage.getItem('fc_subs_quit') || '[]');

    function toggleClr(inputId, btnId) {
        const val = document.getElementById(inputId).value;
        document.getElementById(btnId).style.display = val !== '' ? 'flex' : 'none';
    }

    function clearInp(inputId, btnId) {
        document.getElementById(inputId).value = '';
        toggleClr(inputId, btnId);
        document.getElementById(inputId).focus();
    }

    function addItem() {
        const name = document.getElementById('nameInput').value.trim();
        const date = document.getElementById('dateInput').value;
        if (!name || !date) return;

        subs.push({ id: Date.now(), name, date });
        saveAndRender();

        document.getElementById('nameInput').value = '';
        document.getElementById('dateInput').value = '';
        toggleClr('nameInput', 'clrName');
        document.querySelectorAll('input').forEach(i => i.blur());
    }

    function deleteItem(id) {
        subs = subs.filter(item => item.id !== id);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('fc_subs_quit', JSON.stringify(subs));
        renderList();
    }

    function renderList() {
        const list = document.getElementById('subsList');
        list.innerHTML = '';
        const now = new Date();
        now.setHours(0,0,0,0);

        const sorted = [...subs].sort((a, b) => new Date(a.date) - new Date(b.date));

        sorted.forEach(item => {
            const target = new Date(item.date);
            target.setHours(0,0,0,0);
            const diffDays = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            
            const dStr = target.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            
            let statusClass = "";
            let displayNum = diffDays;
            let unitText = "DAYS";

            if (diffDays === 0) {
                statusClass = "urgent";
                displayNum = "0";
            } else if (diffDays < 0) {
                statusClass = "past-due";
                displayNum = "!";
                unitText = "PAST";
            }

            const div = document.createElement('div');
            div.className = `subs-item ${statusClass}`;
            div.innerHTML = `
                <div class="subs-info">
                    <div class="subs-name">${item.name}</div>
                    <div class="subs-date">Next Bill: ${dStr}</div>
                </div>
                <div class="subs-countdown">
                    <span class="days-num">${displayNum}</span>
                    <span class="days-unit">${unitText}</span>
                </div>
                <button class="del-btn" onclick="deleteItem(${item.id})">×</button>
            `;
            list.appendChild(div);
        });
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                if (data.footerHtml) document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
            }
        } catch (e) {}
    }

    window.onload = () => {
        renderList();
        loadFooter();
    };
</script>

</body>
</html>
